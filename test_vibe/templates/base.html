{% load static %}
<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Hệ thống Tri thức Ứng Dụng Vàng{% endblock %}</title>

    <!-- Link Bootstrap & FontAwesome -->
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"> -->
    <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"> -->

    <!-- Thay thế Bootstrap CSS -->
    <link href="{% static 'chatbot_guide/css/bootstrap.min.css' %}" rel="stylesheet">

    <!-- Thay thế Font Awesome -->
    <link href="{% static 'chatbot_guide/css/all.min.css' %}" rel="stylesheet">


    <!-- CSS dùng chung cho toàn bộ hệ thống ChatBot -->
    <style>
        /* 1. KHÓA GỐC: Chặn Bootstrap thay đổi tỷ lệ rem */
        :root,
        html {
            font-size: 16px !important;
        }

        /* 2. TRẢ LẠI CHỮ CHO ADMIN: Đảm bảo các bảng nghiệp vụ KPHT to rõ */
        body {
            background-color: #f8f8f8;
            font-size: 15px !important;
            /* Ép lên 15px */
            font-family: "Roboto", "Lucida Grande", Verdana, Arial, sans-serif !important;
        }

        /* 3. CỐ ĐỊNH BẢNG: Bootstrap rất hay bóp nhỏ table */
        table,
        td,
        th {
            font-size: 14px !important;
            /* Cỡ chữ chuẩn của Django Admin */
        }

        /* 4. NAVBAR: Giữ nguyên phong cách của anh */
        .navbar-django {
            background: #417690 !important;
        }

        .navbar-brand {
            font-size: 1.2rem !important;
        }
    </style>

    <!-- Chỗ này để các file con như guide.html ném CSS riêng vào -->
    {% block extra_css %}{% endblock %}
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-django shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand" href="/guide/">
                <i class="fa fa-robot me-2"></i>CHATBOT Ứng Dụng Vàng
            </a>
            <div class="d-flex">
                <span class="navbar-text text-white small">
                    User: <strong>{{ user.username|default:"Admin" }}</strong>
                </span>
            </div>
        </div>
    </nav>

    <!-- Nội dung thay đổi sẽ nằm ở đây -->
    <div class="main-wrapper">
        {% block content %}
        {% endblock %}
    </div>

    <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script> -->
    <script src="{% static 'chatbot_guide/js/bootstrap.bundle.min.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>

</html>
