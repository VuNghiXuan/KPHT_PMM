{% extends "admin/base.html" %}
{% block content %}
<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="panel">
        <p>Chọn file JSON chứa Prompt Templates để import vào hệ thống:</p>
        <input type="file" name="json_file" accept=".json">
        <br><br>
        <input type="submit" value="Bắt đầu Import" class="default">
    </div>
</form>
{% endblock %}
